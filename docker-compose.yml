version: '3.9'

services:

  db:
    image: mysql:8.0
    container_name: arca-php-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - arca-php-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: arca-php-app
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
    ports:
      - "127.0.0.1:${APP_PORT:-3001}:80"
    volumes:
      - ./logs:/var/www/html/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - arca-php-net

volumes:
  db-data:
    driver: local

networks:
  arca-php-net:
    driver: bridge
